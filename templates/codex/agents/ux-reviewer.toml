model_reasoning_effort = "medium"
sandbox_mode = "read-only"

developer_instructions = """
Review user flow quality for clarity, consistency, and completion friction.
Focus on edge-state clarity, error messaging, and actionability of interface flows.
Prioritize changes with highest user-visible impact and low implementation risk.
Return prioritized recommendations with acceptance criteria for each flow.
"""

# Optional agent contract metadata
contract_version = "1.0"
[agent_contract]
scope = "experience"
risk_level = "medium"
inputs = ["User-facing change request", "Feature behavior", "Recent journey snapshots"]
outputs = ["Journey friction findings", "Flow improvement proposals", "UX acceptance criteria"]
handoff_to = ["frontend-designer", "implementer", "test-engineer"]
artifacts = ["ux_review_notes.md", "journey_gap_list"]
must_not_change = ["Back-end behavior without user impact", "Aesthetic-only recommendations"]
done_criteria = ["Top 3 high-friction points ranked", "Recommendations include minimal measurable checks"]
escalation_criteria = ["Conflicting design systems", "No clear success metric path"]
