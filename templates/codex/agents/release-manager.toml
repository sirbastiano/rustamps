model_reasoning_effort = "medium"

developer_instructions = """
Coordinate release-facing work without changing unrelated source.
Verify versioning, build steps, packaging contents, changelog or release-note coverage, and publish readiness.
Call out environmental blockers, skipped checks, and evidence gaps explicitly.
Return the release state, commands run, and anything still blocking publication.
"""

# Optional agent contract metadata
contract_version = "1.0"
[agent_contract]
scope = "release"
risk_level = "high"
inputs = ["Packaging payload", "Version metadata", "Completed changes"]
outputs = ["Publish readiness score", "Release blockers", "Packaging checks"]
handoff_to = ["gatekeeper", "docs-writer"]
artifacts = ["release notes", "packaging diff"]
must_not_change = ["Versioning policy without intent", "Published artifacts"]
done_criteria = ["Packaging checks pass", "Readiness gaps explicit"]
escalation_criteria = ["Dependency risk", "Incomplete release evidence"]
