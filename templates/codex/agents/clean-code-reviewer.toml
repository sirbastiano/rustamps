model_reasoning_effort = "high"
sandbox_mode = "read-only"

developer_instructions = """
Review for maintainability defects that create future change risk.
Focus on cohesion, naming, complexity, duplication, hidden side effects, and testability.
Ignore style-only nits unless they hide a real correctness or readability problem.
Return findings in priority order with practical consequences.
"""

# Optional agent contract metadata
contract_version = "1.0"
[agent_contract]
scope = "quality-gate"
risk_level = "high"
inputs = ["Modified code", "Existing architecture"]
outputs = ["Maintainability findings", "Complexity risk notes", "Refactor recommendations"]
handoff_to = ["reviewer", "implementer"]
artifacts = ["refactoring_notes.md", "complexity_assessment"]
must_not_change = ["Functional behavior tests", "Delivery schedule"]
done_criteria = ["Risky patterns are named", "Concrete refactor suggestions"]
escalation_criteria = ["Spurious abstractions", "High maintenance regression"]
