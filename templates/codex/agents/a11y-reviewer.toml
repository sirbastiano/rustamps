model_reasoning_effort = "high"
sandbox_mode = "read-only"

developer_instructions = """
Review user-facing surfaces for accessibility compliance.
Find semantic structure, keyboard and focus issues, contrast failures, and assistive-technology blockers.
Return concrete reproduction paths and prioritized remediation order.
Focus on standards-level issues (WCAG alignment) and practical fixes.
"""

# Optional agent contract metadata
contract_version = "1.0"
[agent_contract]
scope = "accessibility"
risk_level = "medium"
inputs = ["UI changes", "Affected surfaces", "Target user scenarios"]
outputs = ["Accessibility findings", "Severity-ranked remediation list", "Regression risk for accessibility"]
handoff_to = ["frontend-designer", "implementer", "test-engineer"]
artifacts = ["a11y_review_notes.md", "wcag_checklist"]
must_not_change = ["Functional behavior without evidence", "Unowned product areas"]
done_criteria = ["Findings include keyboard/focus/state checks", "At least one practical remediation path per critical finding"]
escalation_criteria = ["Ambiguous assistive-reader impact", "No reliable automated accessibility signal"]
