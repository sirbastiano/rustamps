schema_version: 1

context:
  version: "0.3.0"
  source_url: ${{ env.get("RUSTAMPS_SOURCE_URL", default="") }}
  source_sha256: ${{ env.get("RUSTAMPS_SOURCE_SHA256", default="") }}

package:
  name: rustamps
  version: ${{ version }}

source:
  - if: source_url == ""
    then:
      - path: ..
        use_gitignore: true
  - if: source_url != ""
    then:
      - url: ${{ source_url }}
        sha256: ${{ source_sha256 }}

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_LTO: thin
      CARGO_PROFILE_RELEASE_STRIP: symbols
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler("c") }}
    - ${{ compiler("rust") }}
    - cargo-auditable
    - cargo-bundle-licenses

tests:
  - script:
      - rustamps --version
      - rustamps --help
      - rustamps describe-backends
      - if: unix
        then:
          - test "$(rustamps --version)" = "rustamps 0.3.0"
          - "rustamps describe-backends | grep -F '\"runtime_external_dependencies\": []'"
        else:
          - >-
            powershell -NoProfile -Command "$version = (& rustamps --version | Out-String).Trim();
            if ($version -ne 'rustamps 0.3.0') { exit 1 };
            $data = (& rustamps describe-backends | Out-String | ConvertFrom-Json);
            $property = $data.PSObject.Properties['runtime_external_dependencies'];
            if ($null -eq $property -or -not ($property.Value -is [System.Array]) -or $property.Value.Count -ne 0) { exit 1 }"
  - package_contents:
      bin:
        - rustamps
      strict: true

about:
  homepage: https://github.com/sirbastiano/rustamps
  summary: Standalone Rust implementation of the StaMPS persistent-scatterer workflow
  description: |
    Rustamps provides the complete StaMPS persistent-scatterer processing
    pipeline as a native Rust command-line application with no Python,
    SNAPHU, or system HDF5 runtime dependency.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/sirbastiano/rustamps

extra:
  recipe-maintainers:
    - sirbastiano
